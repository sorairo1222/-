<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }
    header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 15px;
    }
    .post {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .post h2 {
      margin-top: 0;
    }
    .date {
      color: gray;
      font-size: 0.9em;
    }
    footer {
      text-align: center;
      padding: 15px;
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>My Blog</h1>
  <p>日常や考えを書いていくブログ</p>
</header>

<div class="container">
  <div class="post">
    <h2>はじめての投稿</h2>
    <p class="date">2026/04/27</p>
    <p>これは最初のブログ記事です。ここに自由に文章を書いていきます。</p>
  </div>

  <div class="post">
    <h2>2つ目の記事</h2>
    <p class="date">2026/04/26</p>
    <p>ブログっぽく、記事をどんどん追加できます。</p>
  </div>
</div>

<footer>
  <p>© 2026 My Blog</p>
</footer>

</body>
</html>
