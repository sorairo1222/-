<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Twemoji 一覧</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js"></script>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
}

#emoji-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 10px;
}

.emoji {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
}

.emoji img {
    width: 36px;
    height: 36px;
}

.code {
    font-size: 10px;
    color: #666;
    word-break: break-all;
}
</style>
</head>
<body>

<h1>Twemoji 一覧</h1>

<div id="emoji-list"></div>

<script>
const emojis = [
    "😀","😁","😂","🤣","😃","😄","😅","😆","😉","😊",
    "😍","🥰","😘","😎","🤔","😴","😭","😡","👍","👎",
    "👏","🙏","💪","❤️","🔥","✨","⭐","🌈","☀️","🌙",
    "🐶","🐱","🐼","🦄","🍎","🍕","🍔","🍣","⚽","🏀",
    "🚗","🚀","✈️","🎉","🎵","📚","💻","📱","🎮","🧩"
];

const container = document.getElementById("emoji-list");

emojis.forEach(emoji => {
    const div = document.createElement("div");
    div.className = "emoji";
    div.textContent = emoji;

    twemoji.parse(div, {
        folder: "svg",
        ext: ".svg"
    });

    const code = document.createElement("div");
    code.className = "code";
    code.textContent = emoji.codePointAt(0).toString(16);

    div.appendChild(code);
    container.appendChild(div);
});
</script>

</body>
</html>
