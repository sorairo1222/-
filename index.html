<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Twemoji 全一覧</title>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
}

h1 {
    margin-bottom: 20px;
}

#emoji-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
}

.emoji {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
}

.emoji img {
    width: 48px;
    height: 48px;
    display: block;
    margin: 0 auto 6px;
}

.code {
    font-size: 10px;
    color: #666;
    word-break: break-all;
}
</style>
</head>
<body>

<h1>Twemoji 全一覧</h1>

<div id="emoji-list">読み込み中...</div>

<script>
const container = document.getElementById("emoji-list");

fetch("https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/")
.then(() => {})
.catch(() => {});

// GitHub APIからファイル一覧取得
fetch("https://api.github.com/repos/twitter/twemoji/contents/assets/72x72")
.then(res => res.json())
.then(files => {

    container.innerHTML = "";

    files.forEach(file => {

        if (!file.name.endsWith(".png")) return;

        const code = file.name.replace(".png", "");

        const div = document.createElement("div");
        div.className = "emoji";

        const img = document.createElement("img");
        img.src = file.download_url;

        const label = document.createElement("div");
        label.className = "code";
        label.textContent = code;

        div.appendChild(img);
        div.appendChild(label);

        container.appendChild(div);
    });

    document.title =
        `Twemoji 全一覧 (${container.children.length}件)`;
})
.catch(err => {
    container.innerHTML =
        "取得に失敗しました。GitHub APIの制限に達している可能性があります。";
    console.error(err);
});
</script>

</body>
</html>
