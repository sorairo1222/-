```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twemoji Dictionary</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

header{
    position:sticky;
    top:0;
    background:#fff;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    z-index:10;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input,select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

#search{
    flex:1;
}

#count{
    margin-top:10px;
    color:#666;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;
    padding:15px;
}

.card{
    background:white;
    border-radius:12px;
    padding:12px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.card img{
    width:64px;
    height:64px;
}

.name{
    font-weight:bold;
    margin-top:8px;
}

.meta{
    font-size:12px;
    color:#666;
}

.buttons{
    margin-top:8px;
    display:flex;
    flex-direction:column;
    gap:4px;
}

button{
    padding:6px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>

<h2>😀 Twemoji Dictionary</h2>

<div class="controls">

<input
id="search"
placeholder="Search emoji..."
>

<select id="group">
<option value="">All Categories</option>
</select>

<select id="subgroup">
<option value="">All Sub Categories</option>
</select>

</div>

<div id="count">
Loading...
</div>

</header>

<div id="grid" class="grid"></div>

<script>

const DATA_URL =
"https://unicode.org/Public/emoji/latest/emoji-test.txt";

const TWEMOJI =
"https://cdn.jsdelivr.net/gh/twitter/twemoji/assets/svg/";

const grid =
document.getElementById("grid");

const searchInput =
document.getElementById("search");

const groupSelect =
document.getElementById("group");

const subgroupSelect =
document.getElementById("subgroup");

const count =
document.getElementById("count");

let emojis=[];

fetch(DATA_URL)
.then(r=>r.text())
.then(parseEmojiData);

function parseEmojiData(text){

let group="";
let subgroup="";

text.split("\n").forEach(line=>{

if(line.startsWith("# group:")){
group=line.replace("# group:","").trim();
return;
}

if(line.startsWith("# subgroup:")){
subgroup=line.replace("# subgroup:","").trim();
return;
}

if(
!line.includes("; fully-qualified")
) return;

const parts=line.split("#");

if(parts.length<2) return;

const code=
parts[0]
.split(";")[0]
.trim()
.toLowerCase()
.replaceAll(" ","-");

const emojiInfo=
parts[1].trim();

const emoji=
emojiInfo.split(" ")[0];

const name=
emojiInfo
.substring(emoji.length)
.trim();

emojis.push({
emoji,
name,
code,
group,
subgroup
});

});

populateFilters();
render();

}

function populateFilters(){

const groups=
[...new Set(
emojis.map(e=>e.group)
)];

groups.forEach(g=>{
const o=document.createElement("option");
o.value=g;
o.textContent=g;
groupSelect.appendChild(o);
});

groupSelect.addEventListener(
"change",
()=>{
updateSubgroups();
render();
}
);

updateSubgroups();

}

function updateSubgroups(){

subgroupSelect.innerHTML=
'<option value="">All Sub Categories</option>';

const current=
groupSelect.value;

const subgroups=
[...new Set(
emojis
.filter(e=>
!current ||
e.group===current
)
.map(e=>e.subgroup)
)];

subgroups.forEach(s=>{
const o=document.createElement("option");
o.value=s;
o.textContent=s;
subgroupSelect.appendChild(o);
});

}

searchInput.addEventListener(
"input",
render
);

subgroupSelect.addEventListener(
"change",
render
);

function render(){

const search=
searchInput.value.toLowerCase();

const group=
groupSelect.value;

const subgroup=
subgroupSelect.value;

const filtered=
emojis.filter(e=>{

return (
(!group || e.group===group)
&&
(!subgroup || e.subgroup===subgroup)
&&
(
e.name.toLowerCase().includes(search)
||
e.code.includes(search)
||
e.emoji.includes(search)
)
);

});

count.textContent=
`${filtered.length} emojis`;

grid.innerHTML="";

filtered.forEach(e=>{

const svg=
TWEMOJI + e.code + ".svg";

const card=
document.createElement("div");

card.className="card";

card.innerHTML=`

<img loading="lazy" src="${svg}">

<div class="name">
${e.name}
</div>

<div>
${e.emoji}
</div>

<div class="meta">
${e.group}
</div>

<div class="meta">
${e.subgroup}
</div>

<div class="buttons">

<button onclick="
navigator.clipboard.writeText('${e.emoji}')
">
Copy Emoji
</button>

<button onclick="
navigator.clipboard.writeText('${e.code}')
">
Copy Code
</button>

<button onclick="
downloadSvg('${svg}','${e.code}')
">
Download SVG
</button>

</div>
`;

grid.appendChild(card);

});

}

function downloadSvg(url,name){

const a=
document.createElement("a");

a.href=url;
a.download=name+".svg";

document.body.appendChild(a);

a.click();

a.remove();

}

</script>

</body>
</html>
```
